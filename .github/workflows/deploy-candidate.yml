name: Deploy Candidate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - workers/**
      - packages/**
      - tests/**
      - package.json
      - tsconfig.json
      - .github/workflows/deploy-candidate.yml

jobs:
  candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: rm -f package-lock.json
      - run: npm install --package-lock=false
      - run: npm run candidate
      - name: Wrangler dry run
        run: npm run worker:deploy:dry
        continue-on-error: true
